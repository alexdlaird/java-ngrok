name: Release

run-name: Release ${{ inputs.bump_type }}

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prereq:
    uses: alexdlaird/.github/.github/workflows/release-prereq.yml@main
    with:
      bump_type: ${{ inputs.bump_type }}
      version_file: 'build.gradle'
      version_pattern: 's/^version ".*"/version "${VERSION}"/'
      repo_slug: alexdlaird/java-ngrok
    secrets:
      bot_app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
      bot_private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  build:
    needs: prereq
    uses: alexdlaird/java-ngrok/.github/workflows/build.yml@main
    secrets: inherit

  release:
    needs: [prereq, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: zulu

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.prereq.outputs.version }}
          SHA: ${{ needs.prereq.outputs.squash_commit_sha }}
          RELEASE_NOTES: ${{ needs.prereq.outputs.release_notes }}
        run: |
          gh release create "$VERSION" \
            --target "$SHA" \
            --title "$VERSION" \
            --notes "$RELEASE_NOTES"

      - name: Publish to Maven Central
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
        run: make upload

  cleanup:
    needs: [prereq, release]
    if: always() && needs.prereq.result == 'success'
    uses: alexdlaird/.github/.github/workflows/release-cleanup.yml@main
    secrets:
      bot_app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
      bot_private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
